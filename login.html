
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>养老会员管理系统-登录</title>
    <style>
        body{background:#f5f7fa;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}
        .login-box{width:350px;padding:40px;background:#fff;border-radius:10px;box-shadow:0 0 20px #eee;}
        h2{text-align:center;color:#333;margin:0 0 30px;}
        input{width:100%;box-sizing:border-box;padding:12px 15px;margin:10px 0;border:1px #ddd solid;border-radius:6px;}
        button{width:100%;padding:13px;background:#27ae60;border:none;color:#fff;font-size:16px;border-radius:6px;cursor:pointer;}
    </style>
</head>
<body>
    <div class="login-box">
        <h2>后台管理登录</h2>
        <input type="text" id="username" placeholder="管理员账号" value="admin">
        <input type="password" id="pwd" placeholder="登录密码" value="123456">
        <button onclick="login()">立即登录</button>
    </div>

<script>
function login(){
    let u = document.getElementById('username').value;
    let p = document.getElementById('pwd').value;
    fetch('/app/controller/Login.php',{
        method:'POST',
        body:JSON.stringify({username:u,pwd:p})
    }).then(res=>res.json()).then(data=>{
        if(data.code==1){
            localStorage.token = data.token;
            location.href="index.html";
        }else{
            alert(data.msg);
        }
    })
}
</script>
</body>
</html>
